<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветовая Викторина</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фон, который будет плавно менять цвет -->
    <div id="bg-overlay"></div>

    <div class="quiz-box" id="quiz">
        <div class="header">
            <span id="progress">Вопрос 1 из 3</span>
            <h2 id="question-text">Загрузка...</h2>
        </div>
        
        <div id="answer-options" class="options-grid">
            <!-- Кнопки появятся здесь -->
        </div>

        <button id="next-button" class="hide">Далее →</button>
    </div>

    <div id="result-box" class="hide">
        <h2>Результат</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()">Начать заново</button>
    </div>

    <script src="1.js"></script>
</body>
</html>
